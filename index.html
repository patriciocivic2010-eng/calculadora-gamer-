<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora Gamer Arcade</title>

<style>
body{
  background:#111;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  position:relative;
  background:#1b1b1b;
  padding:18px;
  border-radius:14px;
  width:420px;
}

/* BOTÕES LATERAIS */
.sideButtons{
  position:absolute;
  left:-180px;
  top:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.sideBtn{
  background:#222;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  border:1px solid #444;
  text-align:center;
}

/* TROFÉUS */
#trophyPanel{
  display:none;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000e6;
  padding:15px;
  border-radius:14px;
  box-sizing:border-box;
}

.trophy{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  padding:8px;
  border:1px solid #333;
  border-radius:8px;
}

/* CALCULADORA */
#calc{
  background:#0b0b0b;
  padding:12px;
  border-radius:12px;
}

#tela{
  width:100%;
  height:55px;
  font-size:26px;
  text-align:right;
  padding:8px;
  border:none;
  background:#000;
  color:#00ff66;
  border-radius:8px;
  margin-bottom:10px;
}

.calc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.calc-btn{
  height:50px;
  background:#1f1f1f;
  border:1px solid #333;
  color:#00ff66;
  border-radius:8px;
  cursor:pointer;
}

/* MENU */
#menu,#gameArea{display:none;text-align:center;}

canvas{
  background:black;
  display:block;
  margin:auto;
}

/* HUD */
#hud{
  position:absolute;
  bottom:10px;
  right:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="sideButtons">
<div class="sideBtn" onclick="toggleTrophies()">🏆 Troféus</div>
<div class="sideBtn" onclick="showMenu()">🎮 Jogos</div>
<div class="sideBtn" onclick="showCalc()">🧮 Calculadora</div>
</div>

<!-- TROFÉUS -->
<div id="trophyPanel">
<h3>Troféus</h3>

<div class="trophy"><span>Multiplicação</span><span id="t1">❌</span></div>
<div class="trophy"><span>Rei do Pong</span><span id="t2">❌</span></div>
<div class="trophy"><span>Super Snake</span><span id="t3">❌</span></div>
<div class="trophy"><span>Cobra-fio-de-Barbados</span><span id="t4">❌</span></div>
<div class="trophy"><span>Entre no jogo</span><span id="t5">❌</span></div>

<button onclick="toggleTrophies()">Fechar</button>
</div>

<!-- CALCULADORA -->
<div id="calc">
<input id="tela" readonly>

<div class="calc-grid">
<button class="calc-btn" onclick="add('7')">7</button>
<button class="calc-btn" onclick="add('8')">8</button>
<button class="calc-btn" onclick="add('9')">9</button>
<button class="calc-btn" onclick="add('/')">/</button>

<button class="calc-btn" onclick="add('4')">4</button>
<button class="calc-btn" onclick="add('5')">5</button>
<button class="calc-btn" onclick="add('6')">6</button>
<button class="calc-btn" onclick="add('*')">*</button>

<button class="calc-btn" onclick="add('1')">1</button>
<button class="calc-btn" onclick="add('2')">2</button>
<button class="calc-btn" onclick="add('3')">3</button>
<button class="calc-btn" onclick="add('-')">-</button>

<button class="calc-btn" onclick="add('0')">0</button>
<button class="calc-btn" onclick="clearT()">C</button>
<button class="calc-btn" onclick="calc()">=</button>
<button class="calc-btn" onclick="add('+')">+</button>
</div>
</div>

<!-- MENU -->
<div id="menu">
<button onclick="start('snake')">🐍 Snake</button>
<button onclick="start('pong')">🏓 Pong</button>
</div>

<!-- GAME -->
<div id="gameArea">
<canvas id="c" width="240" height="240"></canvas>
</div>

<!-- HUD -->
<div id="hud">
<div>Snake: <span id="snakeHud">0</span></div>
<div>Pong: <span id="pongHud">0</span></div>
<div>Best S: <span id="bestSnake">0</span></div>
<div>Best P: <span id="bestPong">0</span></div>
</div>

</div>

<script>

/* ===== STATE ===== */
let mode="calc";

let snake=[],food,dir="RIGHT";
let snakeScore=0;

let ball,paddle,pongScore=0;

let bestSnake=+localStorage.getItem("bestSnake")||0;
let bestPong=+localStorage.getItem("bestPong")||0;

/* ===== TROFÉUS ===== */
let trophies={
mult: localStorage.getItem("t_mult")==="1",
pong: localStorage.getItem("t_pong")==="1",
snake: localStorage.getItem("t_snake")==="1",
frag: localStorage.getItem("t_frag")==="1",
enter: localStorage.getItem("t_enter")==="1"
};

/* ===== CONTROLES ===== */
let keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()]=false;
});

/* ===== SAVE TROFÉU ===== */
function saveT(k){
trophies[k]=true;
localStorage.setItem("t_"+k,"1");
updateTrophies();
}

/* ===== UI ===== */
function toggleTrophies(){
let p=document.getElementById("trophyPanel");
p.style.display=p.style.display==="block"?"none":"block";
updateTrophies();
}

function showMenu(){
document.getElementById("calc").style.display="none";
document.getElementById("menu").style.display="block";
document.getElementById("gameArea").style.display="none";
}

function showCalc(){
document.getElementById("calc").style.display="block";
document.getElementById("menu").style.display="none";
document.getElementById("gameArea").style.display="none";
}

/* ===== CALC ===== */
let tela=document.getElementById("tela");

function add(v){tela.value+=v;}
function clearT(){tela.value="";}

function calc(){
if(tela.value.includes("*")) saveT("mult");
tela.value=eval(tela.value);
}

/* ===== START ===== */
function start(g){
mode=g;
document.getElementById("menu").style.display="none";
document.getElementById("gameArea").style.display="block";

saveT("enter");

if(mode==="snake") initSnake();
if(mode==="pong") initPong();
}

/* ===== CANVAS ===== */
const c=document.getElementById("c");
const ctx=c.getContext("2d");

/* ===== SNAKE ===== */
let lastS=0;
let ate=false;

function initSnake(){
snake=[{x:60,y:60}];
food={x:120,y:120};
snakeScore=0;
dir="RIGHT";
ate=false;
}

function snakeLoop(){
if(mode!=="snake")return;

if(Date.now()-lastS<120)return;
lastS=Date.now();

ctx.fillStyle="black";
ctx.fillRect(0,0,240,240);

if(keys["w"]||keys["arrowup"])dir="UP";
if(keys["s"]||keys["arrowdown"])dir="DOWN";
if(keys["a"]||keys["arrowleft"])dir="LEFT";
if(keys["d"]||keys["arrowright"])dir="RIGHT";

let h={...snake[0]};

if(dir==="RIGHT")h.x+=12;
if(dir==="LEFT")h.x-=12;
if(dir==="UP")h.y-=12;
if(dir==="DOWN")h.y+=12;

if(h.x<0||h.x>=240||h.y<0||h.y>=240){
if(!ate) saveT("frag");

if(snakeScore>bestSnake){
bestSnake=snakeScore;
localStorage.setItem("bestSnake",bestSnake);
}
initSnake();
return;
}

snake.unshift(h);

if(h.x===food.x&&h.y===food.y){
snakeScore++;
ate=true;
food={
x:Math.floor(Math.random()*20)*12,
y:Math.floor(Math.random()*20)*12
};
}else snake.pop();

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,12,12);

snake.forEach((s,i)=>{
ctx.fillStyle=i?"green":"lime";
ctx.fillRect(s.x,s.y,12,12);
});
}

/* ===== PONG ===== */
let lastP=Date.now();

function initPong(){
ball={x:120,y:120,dx:3,dy:3};
paddle=90;
pongScore=0;
}

function pongLoop(){
if(mode!=="pong")return;

ctx.fillStyle="black";
ctx.fillRect(0,0,240,240);

if(Date.now()-lastP>=1000){
pongScore++;
lastP=Date.now();
}

if(keys["a"]||keys["arrowleft"])paddle-=6;
if(keys["d"]||keys["arrowright"])paddle+=6;

ball.x+=ball.dx;
ball.y+=ball.dy;

if(ball.x<=0||ball.x>=230)ball.dx*=-1;
if(ball.y<=0)ball.dy*=-1;

if(ball.y>=240){
if(pongScore>bestPong){
bestPong=pongScore;
localStorage.setItem("bestPong",bestPong);
}
initPong();
return;
}

if(ball.y>=210&&ball.x>=paddle&&ball.x<=paddle+60)ball.dy*=-1;

ctx.fillStyle="white";
ctx.fillRect(ball.x,ball.y,10,10);
ctx.fillRect(paddle,220,60,10);
}

/* ===== HUD ===== */
function updateHUD(){
document.getElementById("snakeHud").innerText=snakeScore;
document.getElementById("pongHud").innerText=pongScore;
document.getElementById("bestSnake").innerText=bestSnake;
document.getElementById("bestPong").innerText=bestPong;
}

/* ===== TROFÉUS UI ===== */
function updateTrophies(){
document.getElementById("t1").innerText=trophies.mult?"✔":"❌";
document.getElementById("t2").innerText=trophies.pong?"✔":"❌";
document.getElementById("t3").innerText=trophies.snake?"✔":"❌";
document.getElementById("t4").innerText=trophies.frag?"✔":"❌";
document.getElementById("t5").innerText=trophies.enter?"✔":"❌";
}

/* ===== LOOP ===== */
function loop(){
snakeLoop();
pongLoop();
updateHUD();
requestAnimationFrame(loop);
}
loop();

updateTrophies();

</script>

</body>
</html>
